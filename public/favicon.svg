<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- bola: metade futebol (branca, gomos pretos) + metade volei (azul, faixas curvas) -->
  <path d="M256 26 A230 230 0 0 0 256 486 Z" fill="#ffffff"/>
  <path d="M256 26 A230 230 0 0 1 256 486 Z" fill="#dceeff"/>

  <!-- gomos pretos do lado futebol -->
  <g fill="#14141c">
    <polygon points="145,120 197,158 177,220 113,220 93,158"/>
    <polygon points="110,278 150,307 135,354 85,354 70,307"/>
  </g>

  <!-- faixas curvas do lado volei -->
  <g fill="none" stroke-linecap="round">
    <path d="M256 55 C 330 120, 330 392, 256 457" stroke="#1f6fd6" stroke-width="16"/>
    <path d="M256 55 C 372 140, 372 372, 256 457" stroke="#1f6fd6" stroke-width="16"/>
    <path d="M256 55 C 330 120, 330 392, 256 457" stroke="#f5a623" stroke-width="7"/>
  </g>

  <!-- anel externo da bola -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#14141c" stroke-width="14"/>

  <!-- R central, com halo branco pra legibilidade sobre os dois lados -->
  <text x="256" y="292" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="230" fill="none" stroke="#ffffff" stroke-width="16" paint-order="stroke">R</text>
  <text x="256" y="292" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="230" fill="#14141c">R</text>
</svg>
